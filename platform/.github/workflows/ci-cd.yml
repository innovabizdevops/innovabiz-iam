name: InnovaBiz CI/CD Pipeline

on:
    push:
        branches: ["main", "develop"]
    pull_request:
        branches: ["main"]

env:
    PNPM_VERSION: 9.x
    NODE_VERSION: 20.x

jobs:
    # -----------------------------------------------------------------------------
    # Job 1: Quality Assurance (Lint & Test)
    # -----------------------------------------------------------------------------
    quality-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Capability Model & Factory
              run: |
                  pnpm --filter @innovabiz/capability-model run build
                  pnpm --filter @innovabiz/universal-factory run build

            - name: Lint (Backend & Frontend)
              run: pnpm run lint
              continue-on-error: true # Warning only for now

            - name: Backend Build
              working-directory: ./backend
              run: npm run build

            - name: Run Backend Unit Tests
              working-directory: ./backend
              env:
                  NODE_OPTIONS: "--max-old-space-size=4096"
              run: npx jest --maxWorkers=1 --forceExit --ci

    # -----------------------------------------------------------------------------
    # Job 2: Container Build Verification (Docker)
    # -----------------------------------------------------------------------------
    docker-verification:
        runs-on: ubuntu-latest
        needs: quality-check
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Frontend Image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile.frontend
                  push: false # Validate build only
                  tags: innovabiz/frontend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build Backend Image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile.backend
                  push: false # Validate build only
                  tags: innovabiz/backend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
